<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Geolith WASM — Neo Geo Demo</title>
    <link rel="icon" href="data:," />

    <!-- Base theme from the engine-specs demo template, then our Neo Geo skin.
         geolith.css is loaded last so its :root token overrides win. -->
    <link rel="stylesheet" href="./demo.css" />
    <link rel="stylesheet" href="./geolith.css" />
  </head>
  <body>
    <main></main>

    <!-- Hand the Geolith SDK to the template shell (sdk.js picks up window.SDK),
         then boot the shared demo.js. Order matters: SDK must exist before
         demo.js runs its top-level getSdk(). -->
    <script type="module">
      import sdk from "./geolith/geolith.sdk.js";

      // The template shell only passes fileName/byteLength, so the hardware
      // options keep their defaults (mvs/us — which demands neogeo.zip). These
      // decide *which* BIOS file the core looks for inside the zip, so expose
      // them as page query params: ?system=aes, ?system=uni&region=jp, ...
      const params = new URLSearchParams(location.search);
      const overrides = {};
      for (const key of ["system", "region", "unihw"]) {
        const value = params.get(key);
        if (value) overrides[key] = value;
      }

      window.SDK = {
        ...sdk,
        load: (config) =>
          sdk.load({ ...config, options: { ...config.options, ...overrides } }),
      };

      // Geolith cannot boot without a system BIOS (neogeo.zip / aes.zip);
      // `?bios=required` is the template's own knob, read from demo.js's
      // import.meta.url — no fork needed.
      await import("./demo.js?bios=required");
    </script>
  </body>
</html>
