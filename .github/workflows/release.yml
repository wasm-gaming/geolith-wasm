name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions: {}

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  sdk:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate
        run: |
          make typecheck
          make test

      - name: Build SDK (TypeScript + manifest + demo shell)
        run: make build-sdk

      - name: Upload SDK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sdk-dist
          path: dist/

  wasm:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    container:
      image: emscripten/emsdk:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build WASM runtime
        run: |
          apt-get update -qq && apt-get install -y git make -qq
          make build-wasm-ci

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-dist
          path: |
            dist/geolith/

  release:
    needs: [sdk, wasm]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      id-token: write
    # Must match the Environment configured for npm Trusted Publisher.
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          scope: '@wasm-gaming'
          registry-url: https://registry.npmjs.org

      - name: Download SDK artifacts
        uses: actions/download-artifact@v4
        with:
          name: sdk-dist
          path: dist

      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: wasm-dist
          path: dist

      - name: Upgrade npm for OIDC trusted publishing
        run: |
          npm install -g npm@latest
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Configure Git
        run: |
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com

      - name: Bump version, commit, and tag
        id: bump_version
        run: |
          NEW_TAG=$(npm version "${{ inputs.bump }}" -m "chore(release): %s")
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

      - name: npm publish preflight
        run: |
          npm config get registry
          npm pack --dry-run

      - name: Publish to npm
        run: npm publish --provenance --access public

      - name: Push commit and tag
        run: git push origin HEAD --follow-tags

      - name: Package dist archives
        run: |
          cp -r dist geolith-wasm
          tar -czf geolith-wasm.tar.gz geolith-wasm
          zip -r geolith-wasm.zip geolith-wasm

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump_version.outputs.new_tag }}
          name: ${{ steps.bump_version.outputs.new_tag }}
          generate_release_notes: true
          files: |
            geolith-wasm.tar.gz
            geolith-wasm.zip
